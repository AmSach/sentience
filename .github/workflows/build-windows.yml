name: Build Windows Executable

on:
  push:
    branches: [main, master]
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 requests python-dotenv pyperclip playwright
          pip install pyinstaller
          playwright install chromium
      
      - name: Build executable
        run: |
          pyinstaller --onefile --windowed --name "Sentience" `
            --hidden-import="PySide6.QtCore" `
            --hidden-import="PySide6.QtGui" `
            --hidden-import="PySide6.QtWidgets" `
            --hidden-import="playwright" `
            --hidden-import="playwright.sync_api" `
            --collect-all="playwright" `
            src/main.py
      
      - name: Create distribution folder
        run: |
          mkdir dist/Sentience-Portable
          move dist/Sentience.exe dist/Sentience-Portable/
          echo "Sentience - Local AI Computer" > dist/Sentience-Portable/README.txt
          echo "================================" >> dist/Sentience-Portable/README.txt
          echo "" >> dist/Sentience-Portable/README.txt
          echo "USAGE:" >> dist/Sentience-Portable/README.txt
          echo "1. Double-click Sentience.exe" >> dist/Sentience-Portable/README.txt
          echo "2. Configure your API key in Settings" >> dist/Sentience-Portable/README.txt
          echo "3. Start chatting!" >> dist/Sentience-Portable/README.txt
          echo "" >> dist/Sentience-Portable/README.txt
          echo "Supported providers: Groq, OpenAI, Anthropic, Ollama" >> dist/Sentience-Portable/README.txt
      
      - name: Create ZIP
        run: |
          cd dist
          Compress-Archive -Path "Sentience-Portable" -DestinationPath "Sentience-Windows.zip"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sentience-Windows
          path: dist/Sentience-Windows.zip
      
      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} dist/Sentience-Windows.zip --clobber