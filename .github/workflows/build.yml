name: Build Windows Executable

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
          pip install PySide6 playwright aiohttp SpeechRecognition pyttsx3
      
      - name: Install Playwright browsers
        run: playwright install chromium
      
      - name: Build executable
        run: |
          pyinstaller --onefile --windowed --name Sentience `
            --add-data "src/browser;browser" `
            --add-data "src/email_agent;email_agent" `
            --add-data "src/oauth_manager;oauth_manager" `
            --add-data "src/voice;voice" `
            --add-data "src/skills;skills" `
            --add-data "src/hosting;hosting" `
            --hidden-import=PySide6 `
            --hidden-import=playwright `
            --hidden-import=aiohttp `
            src/main.py
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sentience-Windows
          path: dist/Sentience.exe
      
      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/Sentience.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 libxcb-xinerama0 libxcb-cursor0
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
          pip install PySide6 playwright aiohttp SpeechRecognition pyttsx3
      
      - name: Build executable
        run: |
          pyinstaller --onefile --name Sentience src/main.py
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sentience-Linux
          path: dist/Sentience

  test-imports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install PySide6 playwright aiohttp SpeechRecognition pyttsx3
      
      - name: Test imports
        run: |
          cd src
          python -c "
          import sys
          sys.path.insert(0, '.')
          print('Testing imports...')
          from browser.automation import BROWSER_TOOLS
          print(f'✓ browser: {len(BROWSER_TOOLS)} tools')
          from email_agent.client import EMAIL_TOOLS
          print(f'✓ email: {len(EMAIL_TOOLS)} tools')
          from oauth_manager.manager import OAUTH_TOOLS
          print(f'✓ oauth: {len(OAUTH_TOOLS)} tools')
          from voice.controller import VOICE_TOOLS
          print(f'✓ voice: {len(VOICE_TOOLS)} tools')
          from skills.registry import SKILL_TOOLS
          print(f'✓ skills: {len(SKILL_TOOLS)} tools')
          from hosting.server import HOSTING_TOOLS
          print(f'✓ hosting: {len(HOSTING_TOOLS)} tools')
          print('All imports successful!')
          "
