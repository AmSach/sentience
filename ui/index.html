<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentience - Local AI Computer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e; color: #eee; height: 100vh; display: flex;
        }
        .sidebar { width: 250px; background: #16213e; padding: 20px; display: flex; flex-direction: column; }
        .sidebar h2 { margin-bottom: 20px; color: #4cc9f0; }
        .conv-list { flex: 1; overflow-y: auto; }
        .conv-item { padding: 10px; cursor: pointer; border-radius: 5px; margin-bottom: 5px; }
        .conv-item:hover { background: #1a1a2e; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .header { padding: 15px 20px; background: #16213e; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { color: #4cc9f0; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 15px; padding: 15px; border-radius: 10px; max-width: 80%; }
        .user { background: #16213e; margin-left: auto; }
        .assistant { background: #0f3460; }
        .input-area { padding: 20px; background: #16213e; display: flex; gap: 10px; }
        .input-area input { flex: 1; padding: 12px 15px; border: none; border-radius: 5px; background: #1a1a2e; color: #eee; font-size: 14px; }
        .input-area button { padding: 12px 20px; background: #4cc9f0; color: #1a1a2e; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .input-area button:hover { background: #3aa8d8; }
        .tools-btn { background: #e94560 !important; }
        .status { font-size: 12px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Conversations</h2>
        <div class="conv-list" id="convList"></div>
        <button onclick="newConversation()">+ New Chat</button>
    </div>
    <div class="main">
        <div class="header">
            <h1>Sentience</h1>
            <div>
                <button onclick="showSettings()">Settings</button>
                <button onclick="showTools()" class="tools-btn">Tools</button>
            </div>
        </div>
        <div class="chat-container" id="chat"></div>
        <div class="input-area">
            <input type="text" id="input" placeholder="Type your message..." onkeypress="if(event.key==='Enter')send()">
            <select id="provider">
                <option value="">Auto</option>
                <option value="openai">OpenAI</option>
                <option value="anthropic">Anthropic</option>
                <option value="groq">Groq</option>
            </select>
            <button onclick="send()">Send</button>
        </div>
    </div>
    <script>
        const API = 'http://127.0.0.1:3131/api';
        let currentConv = null;
        
        async function loadConversations() {
            const res = await fetch(`${API}/conversations`);
            const data = await res.json();
            const list = document.getElementById('convList');
            list.innerHTML = data.conversations.map(c => 
                `<div class="conv-item" onclick="loadConversation('${c.id}')">${c.title || 'New Chat'}</div>`
            ).join('');
        }
        
        async function loadConversation(id) {
            currentConv = id;
            const res = await fetch(`${API}/conversations/${id}/messages`);
            const data = await res.json();
            const chat = document.getElementById('chat');
            chat.innerHTML = data.messages.map(m => 
                `<div class="message ${m.role}">${escapeHtml(m.content)}</div>`
            ).join('');
            chat.scrollTop = chat.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        async function newConversation() {
            currentConv = 'conv-' + Date.now();
            document.getElementById('chat').innerHTML = '';
            loadConversations();
        }
        
        async function send() {
            const input = document.getElementById('input');
            const provider = document.getElementById('provider').value;
            const text = input.value.trim();
            if (!text) return;
            
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="message user">${escapeHtml(text)}</div>`;
            input.value = '';
            
            try {
                const res = await fetch(`${API}/chat`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({messages: [{role: 'user', content: text}], provider})
                });
                const data = await res.json();
                chat.innerHTML += `<div class="message assistant">${escapeHtml(data.response)}</div>`;
                chat.scrollTop = chat.scrollHeight;
            } catch (e) {
                chat.innerHTML += `<div class="message assistant" style="background:#e94560">Error: ${e.message}</div>`;
            }
        }
        
        async function showTools() {
            const res = await fetch(`${API}/tools`);
            const data = await res.json();
            alert('Available Tools:\n' + data.tools.map(t => `  ${t.name}: ${t.description}`).join('\n'));
        }
        
        function showSettings() {
            alert('Settings:\n\n1. Go to Settings > BYOK Keys\n2. Add your API keys:\n   - OpenAI (GPT-4)\n   - Anthropic (Claude)\n   - Groq (Llama)\n\nKeys are stored locally in ~/.sentience/');
        }
        
        // Initialize
        loadConversations();
        newConversation();
    </script>
</body>
</html>
